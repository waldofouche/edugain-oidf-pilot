services:
  offa:
    image: oidfed/offa:0.4.2
    restart: unless-stopped
    volumes:
      - ./offa/config.yaml:/config.yaml:ro
      - ./offa/data:/data
    networks:
      - caddy

  # This would be your service
  whoami:
    image: containous/whoami
    restart: unless-stopped
    networks:
      - caddy

networks:
  caddy:
    external: true
    name: caddy-network
