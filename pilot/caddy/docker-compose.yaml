services:
  caddy:
    image: caddy:2.10.2
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./caddy-secrets:/etc/caddy/caddy-secrets
      - ./data:/data
      - ./config:/config
      - ./static:/static
    networks:
      - caddy

networks:
  caddy:
    name: caddy-network
