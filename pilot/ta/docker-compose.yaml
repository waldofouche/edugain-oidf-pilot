services:
  gota:
    image: oidfed/lighthouse:0.8.3
    restart: unless-stopped
    environment:
      LH_SERVER_TLS_ENABLED: "true"
      LH_SERVER_TLS_REDIRECT_HTTP: "true"
      LH_SERVER_TLS_CERT: /certs/ta.dev.localhost.crt
      LH_SERVER_TLS_KEY: /certs/ta.dev.localhost.key
    volumes:
      - ./lighthouse/config.yaml:/config.yaml:ro
      - ./lighthouse/data:/data
      - ../caddy/data/caddy/certificates/local/ta.dev.localhost/ta.dev.localhost.crt:/certs/ta.dev.localhost.crt:ro
      - ../caddy/data/caddy/certificates/local/ta.dev.localhost/ta.dev.localhost.key:/certs/ta.dev.localhost.key:ro
      - ../caddy/data/caddy/pki/authorities/local/root.crt:/usr/local/share/ca-certificates/caddy-local-root.crt:ro
    networks:
      - caddy

networks:
  caddy:
    external: true
    name: caddy-network
