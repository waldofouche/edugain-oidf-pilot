services:
  shibop1:
    image: shibboleth-idp:12.1.9
    restart: unless-stopped
    depends_on:
      - ldap
    volumes:
      - ./shibboleth-idp-docker/shibboleth-idp:/opt/shibboleth-idp
      - ./logs/idp:/opt/shibboleth-idp/logs
      - ./logs/jetty:/opt/jetty-base/logs
    networks:
      - caddy

  ldap:
    image: osixia/openldap:1.5.0
    restart: unless-stopped
    environment:
      LDAP_ORGANISATION: "eduGAIN OIDF Pilot"
      LDAP_DOMAIN: "op1.dev.localhost"
      LDAP_ADMIN_PASSWORD: "adminpw"
      LDAP_CONFIG_PASSWORD: "configpw"
      LDAP_TLS: "false"
      LDAP_REMOVE_CONFIG_AFTER_SETUP: "false"
    volumes:
      - ./ldap/bootstrap.ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom/50-bootstrap.ldif
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d
    networks:
      - caddy

  ldap-ui:
    image: osixia/phpldapadmin:0.9.0
    restart: unless-stopped
    depends_on:
      - ldap
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: ldap
      PHPLDAPADMIN_HTTPS: "false"
    networks:
      - caddy

  oidc-test:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    restart: unless-stopped
    depends_on:
      - shibop1
    environment:
      OAUTH2_PROXY_PROVIDER: oidc
      OAUTH2_PROXY_OIDC_ISSUER_URL: https://op1.dev.localhost
      OAUTH2_PROXY_CLIENT_ID: sp1-oidc-client
      OAUTH2_PROXY_CLIENT_SECRET: sp1-oidc-secret-change
      OAUTH2_PROXY_REDIRECT_URL: https://sp1.dev.localhost/oauth2/callback
      OAUTH2_PROXY_SCOPE: openid profile email
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_UPSTREAMS: http://whoami:80
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_COOKIE_SECRET: 0123456789abcdef0123456789abcdef
      OAUTH2_PROXY_SSL_INSECURE_SKIP_VERIFY: "true"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
    extra_hosts:
      - "op1.dev.localhost:host-gateway"
    networks:
      - caddy

networks:
  caddy:
    external: true
    name: caddy-network

volumes:
  ldap_data:
  ldap_config:
