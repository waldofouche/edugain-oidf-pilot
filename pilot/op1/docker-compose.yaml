services:
  ldap:
    image: osixia/openldap:1.5.0
    restart: unless-stopped
    environment:
      LDAP_ORGANISATION: "eduGAIN OIDF Pilot"
      LDAP_DOMAIN: "op1.dev.localhost"
      LDAP_ADMIN_PASSWORD: "adminpw"
      LDAP_TLS: "false"
    command: --copy-service
    volumes:
      - ./ldap/bootstrap.ldif:/container/service/slapd/assets/config/bootstrap/ldif/50-bootstrap.ldif:ro
    networks:
      caddy:
        aliases:
          - op1-ldap

  ldap-ui:
    image: osixia/phpldapadmin:0.9.0
    restart: unless-stopped
    depends_on:
      - ldap
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: op1-ldap
      PHPLDAPADMIN_HTTPS: "false"
    networks:
      - caddy

  shibop1:
    image: edugain-pilot/shib-op1:latest
    build:
      context: .
      dockerfile: Dockerfile.shib-op1
    environment:
      IDP_HOST: ${IDP_HOST:-op1.dev.localhost}
      IDP_SCOPE: ${IDP_SCOPE:-dev.localhost}
    restart: unless-stopped
    depends_on:
      - ldap
    volumes:
      - ./logs/idp:/opt/shibboleth-idp/logs
      - ./logs/jetty:/opt/jetty-base/logs
    networks:
      - caddy

  oidc-test:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    restart: unless-stopped
    depends_on:
      - shibop1
    environment:
      OAUTH2_PROXY_PROVIDER: oidc
      OAUTH2_PROXY_OIDC_ISSUER_URL: https://${IDP_HOST:-op1.dev.localhost}
      OAUTH2_PROXY_CLIENT_ID: sp1-oidc-client
      OAUTH2_PROXY_CLIENT_SECRET: sp1-oidc-secret-change
      OAUTH2_PROXY_REDIRECT_URL: https://oidc-test.dev.localhost/oauth2/callback
      OAUTH2_PROXY_SCOPE: openid profile email
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_UPSTREAMS: http://whoami:80
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_COOKIE_SECRET: 0123456789abcdef0123456789abcdef
      OAUTH2_PROXY_SSL_INSECURE_SKIP_VERIFY: "true"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
    extra_hosts:
      - "${IDP_HOST:-op1.dev.localhost}:host-gateway"
    networks:
      - caddy

networks:
  caddy:
    external: true
    name: caddy-network