server:
  port: 8765
signing:
  alg: ES256
  key_dir: "/data/signing/"
federation_data:
  entity_id: "https://ia1.dev.localhost"
  authority_hints:
    - "https://ta.dev.localhost"
  trust_anchors:
    - entity_id: "https://ta.dev.localhost"
  federation_entity_metadata:
    display_name: "eduGAIN OIDF Pilot Intermediate Authority 1"
    organization_name: "eduGAIN"
    organization_uri: "https://edugain.org"
    contacts:
      - support@edugain.org
  metadata_policy_file: "/data/metadata-policy.json"
storage:
  backend: json
  data_dir: "/data/storage"
endpoints:
  fetch:
    path: "/fetch"
  list:
    path: "/list"
  resolve:
    path: "/resolve"
  enroll:
    path: "/enroll"
logging:
  access:
    stderr: true
  internal:
    stderr: true
  smart:
    enabled:true

